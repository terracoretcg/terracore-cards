<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Terra CORE — Deckbuilder</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family: Arial, sans-serif; background:#0f0f10; color:#eee; }
    header { position: sticky; top:0; z-index:10; background:#151516; border-bottom:1px solid #2a2a2a; padding:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input, select, button, textarea {
      background:#101012; color:#eee; border:1px solid #333; border-radius:10px; padding:10px;
    }
    button { cursor:pointer; }
    button:hover { border-color:#555; }
    main { display:grid; grid-template-columns: 1fr 420px; gap:12px; padding:12px; }
    @media (max-width: 980px){ main{ grid-template-columns:1fr; } .deck{ position:static; height:auto; } }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap:10px; }
    .card { background:#141415; border:1px solid #2a2a2a; border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
    .card img { width:100%; height:auto; display:block; background:#000; }
    .meta { padding:10px; display:flex; flex-direction:column; gap:6px; }
    .name { font-weight:700; font-size:14px; line-height:1.2; }
    .sub { font-size:12px; opacity:.85; display:flex; justify-content:space-between; gap:10px; }
    .ability { font-size:12px; opacity:.9; line-height:1.25; max-height:3.6em; overflow:hidden; }
    .deck { position: sticky; top:78px; height: calc(100vh - 100px); overflow:auto; background:#141415; border:1px solid #2a2a2a; border-radius:14px; padding:12px; }
    .deck h2, .deck h3 { margin:0 0 10px 0; font-size:16px; }
    .decklist, .saveddecklist { display:flex; flex-direction:column; gap:8px; margin-top:10px; }
    .deckitem, .saveddeckitem { border:1px solid #2a2a2a; border-radius:12px; padding:10px; background:#121213; }
    .deckitem .top, .saveddeckitem .top { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .qty { display:flex; gap:8px; align-items:center; }
    .qty button { padding:6px 10px; }
    .divider { height:1px; background:#2a2a2a; margin:10px 0; }
    .small { font-size:12px; opacity:.85; }
    textarea { width:100%; min-height:160px; box-sizing:border-box; }
    .pill { font-size:12px; padding:6px 10px; border:1px solid #2a2a2a; border-radius:999px; background:#111; }
    .saveddeckitem .actions { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .saveddeckitem button { padding:6px 8px; font-size:12px; }
    .previewLabel { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px; }
    code { word-break: break-word; }
  </style>
</head>
<body>
  <header>
    <div class="row">
      <strong>Terra CORE — Deckbuilder</strong>
      <span class="pill" id="counts">Loading…</span>
      <span class="small">Painterly + Pixel support</span>
      <span class="pill" id="savedState">Working deck</span>
    </div>
    <div class="row" style="margin-top:10px;">
      <input id="search" placeholder="Search name or abilities…" style="flex:1; min-width:240px;" />
      <select id="type"><option value="">All Types</option></select>
      <select id="galleryStyle">
        <option value="images">Painterly Gallery</option>
        <option value="Pixel">Pixel Gallery</option>
      </select>
      <button id="clearFilters">Clear</button>
    </div>
  </header>

  <main>
    <section>
      <div class="grid" id="grid"></div>
      <div class="small" id="status" style="padding:10px;"></div>
    </section>

    <aside class="deck">
      <h2>Deck</h2>

      <div class="row">
        <input id="deckName" placeholder="Deck name (e.g., Test_01)" style="flex:1;" />
        <button id="saveBrowser">Save to Browser</button>
        <button id="clearDeck">Clear</button>
      </div>

      <div class="divider"></div>

      <div class="row">
        <button id="exportPCIO">Download PC.io CSV</button>
        <button id="showTxt">Show Deck TXT</button>
        <button id="saveTxt">Download Deck TXT</button>
        <label class="small" style="display:flex; align-items:center; gap:8px;">
          Load .txt <input type="file" id="loadTxt" accept=".txt" />
        </label>
      </div>

      <div class="row">
        <button id="exportTTSPng">Export TTS Sheet PNG</button>
        <button id="showTTSInfo">Show TTS Import Info</button>
      </div>

      <div class="small" style="margin-top:8px;">
        Saved format:<br>
        <code>2x VOLCANO_HIDEOUT|images</code><br>
        <code>3x MAGMA_BASTION|Pixel</code><br><br>
        TTS export is built for a 50-card deck as a 10×5 sheet.
      </div>

      <div class="divider"></div>

      <div class="row">
        <div class="small"><span id="deckCount">0</span> cards</div>
      </div>

      <div class="decklist" id="decklist"></div>

      <div class="divider"></div>

      <div class="previewLabel">
        <div class="small" id="previewTitle">Preview</div>
        <button id="copyPreview" type="button">Copy Preview</button>
      </div>
      <textarea id="exportBox" placeholder="Preview will appear here…"></textarea>

      <div class="divider"></div>

      <h3>Saved Decks</h3>
      <div class="small">Stored in this browser on this device.</div>
      <div class="saveddecklist" id="savedDecks"></div>
    </aside>
  </main>

<script>
const CSV_URL = "./cards.csv";
const IMAGE_EXTS = [".JPG", ".jpg", ".JPEG", ".jpeg", ".PNG", ".png"];
const FOLDERS = ["images", "Pixel"];
const SAVED_DECKS_KEY = "terracore_saved_decks_v2";
const TTS_COLUMNS = 10;
const TTS_ROWS = 5;
const TTS_MAX_DIM = 4096;

const el = (id) => document.getElementById(id);

let CARDS = [];
let BY_ID = new Map();
let deck = new Map(); // key = ID|folder
let foundExtByPath = new Map(); // key = folder/ID -> ext
let currentSavedDeckName = "";

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function parseCSV(text){
  const rows = [];
  let i = 0, field = "", row = [], inQuotes = false;

  while (i < text.length){
    const c = text[i];

    if (inQuotes){
      if (c === '"'){
        if (text[i+1] === '"'){ field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      } else {
        field += c; i++; continue;
      }
    } else {
      if (c === '"'){ inQuotes = true; i++; continue; }
      if (c === ','){ row.push(field); field=""; i++; continue; }
      if (c === '\n'){
        row.push(field); field="";
        if (row.some(x => x.trim() !== "")) rows.push(row);
        row = [];
        i++; continue;
      }
      if (c === '\r'){ i++; continue; }
      field += c; i++; continue;
    }
  }

  if (field.length || row.length){
    row.push(field);
    if (row.some(x => x.trim() !== "")) rows.push(row);
  }

  const header = rows.shift()?.map(h => h.trim()) || [];
  return rows.map(r => {
    const obj = {};
    header.forEach((h, idx) => obj[h] = (r[idx] ?? "").trim());
    return obj;
  });
}

function uniq(arr){
  return [...new Set(arr)].filter(Boolean).sort((a,b)=>a.localeCompare(b));
}

function safeFilename(name){
  const cleaned = (name || "").trim().replace(/[^\w\-]+/g, "_");
  return cleaned || "terracore_deck";
}

function deckTotal(){
  let n = 0;
  for (const v of deck.values()) n += v;
  return n;
}

function expandedDeckEntries(){
  const expanded = [];
  for (const [key, qty] of deck.entries()){
    const [id, folder] = key.split("|");
    for (let i = 0; i < qty; i++) expanded.push({ id, folder });
  }
  return expanded;
}

function getFilteredCards(){
  const q = el("search").value.trim().toLowerCase();
  const t = el("type").value;

  return CARDS.filter(c => {
    if (t && (c.Type || "") !== t) return false;
    if (q){
      const hay = `${c.Name || ""} ${(c.Abilities || "")}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

window.tcTryNextExt = function(imgEl){
  const id = imgEl.getAttribute("data-id");
  const folder = imgEl.getAttribute("data-folder");
  let idx = parseInt(imgEl.getAttribute("data-try") || "0", 10) + 1;
  if (idx >= IMAGE_EXTS.length) return;
  imgEl.setAttribute("data-try", String(idx));
  imgEl.src = `./${folder}/${id}${IMAGE_EXTS[idx]}`;
};

window.tcMarkExt = function(imgEl){
  const id = imgEl.getAttribute("data-id");
  const folder = imgEl.getAttribute("data-folder");
  const src = imgEl.getAttribute("src") || "";
  for (const ext of IMAGE_EXTS){
    if (src.endsWith(ext)){
      foundExtByPath.set(`${folder}/${id}`, ext);
      return;
    }
  }
};

function renderGrid(){
  const grid = el("grid");
  grid.innerHTML = "";
  const folder = el("galleryStyle").value;
  const items = getFilteredCards();

  for (const c of items){
    const firstUrl = `./${folder}/${c.ID}${IMAGE_EXTS[0]}`;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img loading="lazy"
           src="${firstUrl}"
           data-id="${escapeHtml(c.ID)}"
           data-folder="${escapeHtml(folder)}"
           data-try="0"
           onerror="window.tcTryNextExt(this)"
           onload="window.tcMarkExt(this)"
           alt="${escapeHtml(c.Name)}" />
      <div class="meta">
        <div class="name">${escapeHtml(c.Name)}</div>
        <div class="sub">
          <span>${escapeHtml(c.Type || "")}</span>
          <span>${escapeHtml(c.Cost || "")}</span>
        </div>
        <div class="ability">${escapeHtml(c.Abilities || "")}</div>
        <div class="row">
          <button class="addPainterly">Add Painterly</button>
          <button class="addPixel">Add Pixel</button>
        </div>
      </div>
    `;

    card.querySelector(".addPainterly").addEventListener("click", () => addToDeck(c.ID, "images", 1));
    card.querySelector(".addPixel").addEventListener("click", () => addToDeck(c.ID, "Pixel", 1));
    grid.appendChild(card);
  }

  el("status").textContent = `Showing ${items.length} of ${CARDS.length} cards.`;
  el("counts").textContent = `${CARDS.length} cards loaded`;
}

function setPreview(title, text){
  el("previewTitle").textContent = title;
  el("exportBox").value = text;
}

function addToDeck(id, folder, delta){
  const key = `${id}|${folder}`;
  const cur = deck.get(key) || 0;
  const next = cur + delta;
  if (next <= 0) deck.delete(key);
  else deck.set(key, next);
  if (currentSavedDeckName) currentSavedDeckName = "";
  updateSavedState();
  renderDeck();
}

function renderDeck(){
  const list = el("decklist");
  list.innerHTML = "";

  const entries = [...deck.entries()]
    .map(([key, qty]) => {
      const [id, folder] = key.split("|");
      return { card: BY_ID.get(id), id, folder, qty };
    })
    .filter(x => x.card)
    .sort((a,b) => (a.card.Name || a.id).localeCompare(b.card.Name || b.id));

  for (const {card, id, folder, qty} of entries){
    const item = document.createElement("div");
    item.className = "deckitem";
    item.innerHTML = `
      <div class="top">
        <div>
          <div class="name">${escapeHtml(card.Name || id)}</div>
          <div class="sub">
            <span>${escapeHtml(card.Type || "")}</span>
            <span>${folder === "images" ? "Painterly" : "Pixel"}</span>
          </div>
        </div>
        <div class="qty">
          <button title="Remove one">-</button>
          <strong>${qty}</strong>
          <button title="Add one">+</button>
        </div>
      </div>
    `;
    const [minusBtn, plusBtn] = item.querySelectorAll("button");
    minusBtn.addEventListener("click", ()=> addToDeck(id, folder, -1));
    plusBtn.addEventListener("click", ()=> addToDeck(id, folder, 1));
    list.appendChild(item);
  }

  el("deckCount").textContent = deckTotal();
}

function siteBase(){
  return location.origin + location.pathname.replace(/\/[^\/]*$/, "/");
}

async function resolveExactExt(id, folder){
  const cacheKey = `${folder}/${id}`;
  if (foundExtByPath.has(cacheKey)) return foundExtByPath.get(cacheKey);

  const base = siteBase();
  for (const ext of IMAGE_EXTS){
    const url = `${base}${folder}/${id}${ext}`;
    try{
      const res = await fetch(url, { method: "HEAD", cache: "no-store" });
      if (res.ok){
        foundExtByPath.set(cacheKey, ext);
        return ext;
      }
    } catch {}
  }

  return IMAGE_EXTS[0];
}

async function buildPCIOCSV(){
  const rows = ["image"];
  const base = siteBase();

  for (const [key, qty] of deck.entries()){
    const [id, folder] = key.split("|");
    const ext = await resolveExactExt(id, folder);
    for (let i = 0; i < qty; i++) rows.push(`${base}${folder}/${id}${ext}`);
  }

  return rows.join("\n") + "\n";
}

function downloadText(text, filename, mime){
  const blob = new Blob([text], { type: mime });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function deckToTxt(){
  const lines = [];
  const entries = [...deck.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
  for (const [key, qty] of entries){
    const [id, folder] = key.split("|");
    const line = `${id}|${folder}`;
    lines.push(qty === 1 ? line : `${qty}x ${line}`);
  }
  return lines.join("\n") + (lines.length ? "\n" : "");
}

function loadDeckFromTxt(text){
  const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
  deck = new Map();

  for (const line of lines){
    const m = line.match(/^(\d+)\s*x?\s+(.+)$/i);
    let qty = 1, payload = line;
    if (m){
      qty = Math.max(1, parseInt(m[1],10));
      payload = m[2].trim();
    }

    let [id, folder] = payload.split("|");
    if (!folder || !FOLDERS.includes(folder)) folder = "images";

    if (BY_ID.has(id)){
      const key = `${id}|${folder}`;
      deck.set(key, (deck.get(key)||0) + qty);
    }
  }

  currentSavedDeckName = "";
  updateSavedState();
  renderDeck();
  setPreview("Deck TXT Preview", deckToTxt() || "");
}

function getSavedDecks(){
  try {
    const raw = localStorage.getItem(SAVED_DECKS_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function setSavedDecks(items){
  localStorage.setItem(SAVED_DECKS_KEY, JSON.stringify(items));
}

function serializeDeckEntries(){
  return [...deck.entries()].map(([key, qty]) => ({ key, qty }));
}

function applySerializedDeck(entries){
  deck = new Map();
  for (const entry of entries || []){
    if (!entry || !entry.key) continue;
    const [id, folder] = String(entry.key).split("|");
    const qty = Math.max(1, parseInt(entry.qty, 10) || 1);
    if (BY_ID.has(id) && FOLDERS.includes(folder)) deck.set(`${id}|${folder}`, qty);
  }
  renderDeck();
}

function saveCurrentDeckToBrowser(){
  const name = (el("deckName").value || "").trim();
  if (!name){
    alert("Type a deck name first.");
    return;
  }
  const items = getSavedDecks();
  const record = {
    name,
    updatedAt: new Date().toISOString(),
    cardCount: deckTotal(),
    entries: serializeDeckEntries()
  };
  const idx = items.findIndex(x => x.name.toLowerCase() === name.toLowerCase());
  if (idx >= 0) items[idx] = record;
  else items.push(record);
  items.sort((a,b) => a.name.localeCompare(b.name));
  setSavedDecks(items);
  currentSavedDeckName = name;
  updateSavedState();
  renderSavedDecks();
}

function renderSavedDecks(){
  const wrap = el("savedDecks");
  const items = getSavedDecks();
  wrap.innerHTML = "";
  if (!items.length){
    wrap.innerHTML = `<div class="small">No saved decks yet.</div>`;
    return;
  }

  for (const item of items){
    const div = document.createElement("div");
    div.className = "saveddeckitem";
    const updated = new Date(item.updatedAt || Date.now());
    div.innerHTML = `
      <div class="top">
        <div>
          <div class="name">${escapeHtml(item.name)}</div>
          <div class="sub">
            <span>${escapeHtml(String(item.cardCount || 0))} cards</span>
            <span>${escapeHtml(updated.toLocaleString())}</span>
          </div>
        </div>
      </div>
      <div class="actions">
        <button data-action="load">Load</button>
        <button data-action="rename">Rename</button>
        <button data-action="duplicate">Duplicate</button>
        <button data-action="delete">Delete</button>
      </div>
    `;
    div.querySelector('[data-action="load"]').addEventListener('click', () => {
      applySerializedDeck(item.entries || []);
      el("deckName").value = item.name;
      currentSavedDeckName = item.name;
      updateSavedState();
      setPreview("Deck TXT Preview", deckToTxt() || "");
    });
    div.querySelector('[data-action="rename"]').addEventListener('click', () => {
      const next = prompt("Rename deck:", item.name);
      if (!next || !next.trim()) return;
      const itemsNow = getSavedDecks();
      if (itemsNow.some(x => x.name.toLowerCase() === next.trim().toLowerCase() && x.name !== item.name)){
        alert("A saved deck with that name already exists.");
        return;
      }
      const target = itemsNow.find(x => x.name === item.name);
      if (!target) return;
      target.name = next.trim();
      target.updatedAt = new Date().toISOString();
      setSavedDecks(itemsNow);
      if (currentSavedDeckName === item.name) {
        currentSavedDeckName = next.trim();
        el("deckName").value = next.trim();
      }
      updateSavedState();
      renderSavedDecks();
    });
    div.querySelector('[data-action="duplicate"]').addEventListener('click', () => {
      const next = prompt("Duplicate as:", `${item.name}_copy`);
      if (!next || !next.trim()) return;
      const itemsNow = getSavedDecks();
      if (itemsNow.some(x => x.name.toLowerCase() === next.trim().toLowerCase())){
        alert("A saved deck with that name already exists.");
        return;
      }
      itemsNow.push({
        name: next.trim(),
        updatedAt: new Date().toISOString(),
        cardCount: item.cardCount || 0,
        entries: item.entries || []
      });
      itemsNow.sort((a,b) => a.name.localeCompare(b.name));
      setSavedDecks(itemsNow);
      renderSavedDecks();
    });
    div.querySelector('[data-action="delete"]').addEventListener('click', () => {
      if (!confirm(`Delete ${item.name}?`)) return;
      const itemsNow = getSavedDecks().filter(x => x.name !== item.name);
      setSavedDecks(itemsNow);
      if (currentSavedDeckName === item.name) currentSavedDeckName = "";
      updateSavedState();
      renderSavedDecks();
    });
    wrap.appendChild(div);
  }
}

function updateSavedState(){
  el("savedState").textContent = currentSavedDeckName ? `Saved deck: ${currentSavedDeckName}` : "Working deck";
}

function buildTTSInfo(){
  const count = deckTotal();
  const status = count === 50 ? "Ready for TTS" : `TTS works best with exactly 50 cards. Current count: ${count}.`;
  return [
    `Deck Name: ${el("deckName").value.trim() || "Unnamed Deck"}`,
    `Status: ${status}`,
    "",
    "Import into Tabletop Simulator as a Custom Deck:",
    "Face: use the exported PNG sheet",
    "Back: use your Terra CORE card back image",
    `Width: ${TTS_COLUMNS}`,
    `Height: ${TTS_ROWS}`,
    `Number of Cards: ${count}`,
    "",
    "Recommended workflow:",
    "1. Export TTS Sheet PNG from this builder",
    "2. Upload the PNG to TTS Cloud or another direct image host",
    "3. In TTS go to Objects > Components > Custom > Custom Deck",
    "4. Paste the face and back URLs and use the settings above",
    "5. Spawn the deck, then right-click it and Save Object"
  ].join("\n");
}

function loadImage(url){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`Could not load image: ${url}`));
    img.src = url;
  });
}

async function buildTTSSheetBlob(){
  const expanded = expandedDeckEntries();
  if (!expanded.length) throw new Error("Your deck is empty.");
  if (expanded.length > TTS_COLUMNS * TTS_ROWS) {
    throw new Error(`This export supports up to ${TTS_COLUMNS * TTS_ROWS} cards on one sheet. Current deck has ${expanded.length}.`);
  }

  const base = siteBase();
  const urls = [];
  for (const entry of expanded){
    const ext = await resolveExactExt(entry.id, entry.folder);
    urls.push(`${base}${entry.folder}/${entry.id}${ext}`);
  }

  const first = await loadImage(urls[0]);
  const srcW = first.naturalWidth || first.width;
  const srcH = first.naturalHeight || first.height;

  const scale = Math.min(1, TTS_MAX_DIM / (srcW * TTS_COLUMNS), TTS_MAX_DIM / (srcH * TTS_ROWS));
  const tileW = Math.max(1, Math.floor(srcW * scale));
  const tileH = Math.max(1, Math.floor(srcH * scale));
  const canvas = document.createElement('canvas');
  canvas.width = tileW * TTS_COLUMNS;
  canvas.height = tileH * TTS_ROWS;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < urls.length; i++){
    const img = i === 0 ? first : await loadImage(urls[i]);
    const x = (i % TTS_COLUMNS) * tileW;
    const y = Math.floor(i / TTS_COLUMNS) * tileH;
    ctx.drawImage(img, x, y, tileW, tileH);
  }

  return await new Promise((resolve, reject) => {
    canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('Could not build PNG.')), 'image/png');
  });
}

async function init(){
  try{
    const res = await fetch(CSV_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("Could not fetch cards.csv");
    const text = await res.text();
    const data = parseCSV(text);

    CARDS = data.map(r => ({
      ID: (r.ID || "").trim(),
      Name: (r.Name || "").trim(),
      Type: (r.Type || "").trim(),
      Cost: (r.Cost || "").trim(),
      Abilities: (r.Abilities || "").trim()
    })).filter(c => c.ID && c.Name);

    BY_ID = new Map(CARDS.map(c => [c.ID, c]));

    const types = uniq(CARDS.map(c=>c.Type));
    const typeSel = el("type");
    typeSel.innerHTML = `<option value="">All Types</option>` +
      types.map(t=>`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");

    renderGrid();
    renderDeck();
    renderSavedDecks();
    updateSavedState();
    setPreview("Preview", "Choose Show Deck TXT, Download PC.io CSV, or Show TTS Import Info.");
  } catch (e){
    el("counts").textContent = "Load failed";
    el("status").textContent = "Could not load cards.csv.";
    console.error(e);
  }
}

el("search").addEventListener("input", renderGrid);
el("type").addEventListener("change", renderGrid);
el("galleryStyle").addEventListener("change", renderGrid);
el("clearFilters").addEventListener("click", () => {
  el("search").value = "";
  el("type").value = "";
  renderGrid();
});

el("clearDeck").addEventListener("click", () => {
  deck = new Map();
  currentSavedDeckName = "";
  updateSavedState();
  renderDeck();
  setPreview("Deck TXT Preview", "");
});

el("saveBrowser").addEventListener("click", () => saveCurrentDeckToBrowser());

el("exportPCIO").addEventListener("click", async () => {
  const name = safeFilename(el("deckName").value);
  el("exportPCIO").disabled = true;
  el("exportPCIO").textContent = "Building CSV...";
  try{
    const csv = await buildPCIOCSV();
    downloadText(csv, `${name}.csv`, "text/csv");
    setPreview("PC.io CSV Preview", csv);
  } finally {
    el("exportPCIO").disabled = false;
    el("exportPCIO").textContent = "Download PC.io CSV";
  }
});

el("showTxt").addEventListener("click", () => {
  setPreview("Deck TXT Preview", deckToTxt());
});

el("saveTxt").addEventListener("click", () => {
  const name = safeFilename(el("deckName").value);
  const txt = deckToTxt();
  setPreview("Deck TXT Preview", txt);
  downloadText(txt, `${name}.txt`, "text/plain");
});

el("loadTxt").addEventListener("change", (evt) => {
  const f = evt.target.files?.[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => loadDeckFromTxt(String(reader.result || ""));
  reader.readAsText(f);
  evt.target.value = "";
});

el("showTTSInfo").addEventListener("click", () => {
  setPreview("TTS Import Info", buildTTSInfo());
});

el("exportTTSPng").addEventListener("click", async () => {
  const name = safeFilename(el("deckName").value || "terracore_tts_deck");
  el("exportTTSPng").disabled = true;
  el("exportTTSPng").textContent = "Building TTS PNG...";
  try {
    const blob = await buildTTSSheetBlob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${name}_tts_sheet.png`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    setPreview("TTS Import Info", buildTTSInfo());
  } catch (err) {
    alert(err.message || String(err));
  } finally {
    el("exportTTSPng").disabled = false;
    el("exportTTSPng").textContent = "Export TTS Sheet PNG";
  }
});

el("copyPreview").addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(el("exportBox").value || "");
    const btn = el("copyPreview");
    const original = btn.textContent;
    btn.textContent = "Copied";
    setTimeout(() => btn.textContent = original, 1000);
  } catch {
    alert("Could not copy preview text.");
  }
});

init();
</script>
</body>
</html>
